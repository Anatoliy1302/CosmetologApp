services:
  cosmetolog-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cosmetolog-api
    restart: unless-stopped
    ports:
      - "${PORT:-3847}:3847"
    environment:
      PORT: 3847
      HOST: 0.0.0.0
      API_KEY: ${API_KEY:-change-me-to-a-long-random-string}
    volumes:
      - cosmetolog-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3847/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cosmetolog-data:
